<svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Outer glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur" />
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.024
                0 0 0 0 0.714
                0 0 0 0 0.831
                0 0 0 0.2 0" result="coloredBlur" />
      <feMerge>
        <feMergeNode in="coloredBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="120" height="120" rx="8" fill="#0a0a0a" />

  <!-- Outer glow circle (static replacement for hover glow) -->
  <circle cx="60" cy="60" r="38" fill="#06b6d4" fill-opacity="0.08" />

  <!-- Main Aerogel Container (Rounded Square) -->
  <rect
    x="20" y="20" width="80" height="80" rx="12"
    fill="#06b6d4" fill-opacity="0.05"
    stroke="#22d3ee" stroke-width="2"
    filter="url(#glow)"
  />

  <!-- BSP Grid Lines -->
  <!-- Primary Vertical Split -->
  <line x1="65" y1="20" x2="65" y2="100"
    stroke="#22d3ee" stroke-opacity="0.4" stroke-width="1" />

  <!-- Secondary Horizontal Split -->
  <line x1="65" y1="60" x2="100" y2="60"
    stroke="#22d3ee" stroke-opacity="0.3" stroke-width="1" />

  <!-- Tertiary Vertical Split -->
  <line x1="85" y1="60" x2="85" y2="100"
    stroke="#22d3ee" stroke-opacity="0.2" stroke-width="1" />

  <!-- Stylized 'A' (Aerospace Wing Element) -->
  <path d="M45 85L65 35L85 85"
    stroke="#ffffff" stroke-width="4"
    stroke-linecap="round" stroke-linejoin="round" />

  <!-- 'A' Crossbar (Translucent) -->
  <path d="M55 65H75"
    stroke="#ffffff" stroke-opacity="0.4" stroke-width="2"
    stroke-linecap="round" />

  <!-- Tech Node Accents (Glowing Dots) -->
  <circle cx="65" cy="35" r="2.5" fill="#67e8f9" />
  <circle cx="45" cy="85" r="2" fill="#67e8f9" fill-opacity="0.6" />
  <circle cx="85" cy="85" r="2" fill="#67e8f9" fill-opacity="0.6" />
</svg>
